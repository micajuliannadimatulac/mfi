name: mahintana
description: Mahintana Foundation auth UI converted from the original HTML/CSS/JavaScript project into Flutter/Dart.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.3.3
  font_awesome_flutter: ^10.8.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/logo-google.png
    - assets/images/matutum.png
    - assets/images/matutum2.png
